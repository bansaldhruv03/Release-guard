apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: release-guard-backend
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 600
      containers:
      - image: release-guard-backend
        ports:
        - containerPort: 8080
        env:
        - name: NODE_ENV
          value: production
        resources:
          limits:
            cpu: "1000m"
            memory: 1Gi
