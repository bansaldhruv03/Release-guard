<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password · Release Guard</title>
  <meta name="description" content="Set a new password for your Release Guard account.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --surface: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --primary: #38bdf8;
      --purple: #a78bfa;
      --danger: #f87171;
      --success: #34d399;
      --text: #e2e8f0;
      --text-muted: #64748b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background-image: radial-gradient(ellipse at 20% 50%, rgba(56,189,248,0.07) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(167,139,250,0.07) 0%, transparent 50%);
    }

    .card {
      background: var(--surface);
      backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 3rem;
      width: 100%;
      max-width: 420px;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 2rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--primary);
    }

    h2 { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.5rem; }
    p.subtitle { color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem; line-height: 1.5; }

    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

    .password-wrapper { position: relative; }
    input[type="password"], input[type="text"] {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 0.8rem 3rem 0.8rem 1rem;
      color: var(--text);
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: var(--primary); }

    .toggle-password {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.1rem;
      opacity: 0.6;
      transition: opacity 0.2s;
    }
    .toggle-password:hover { opacity: 1; }

    .btn {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, var(--primary), var(--purple));
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .alert {
      padding: 0.85rem 1rem;
      border-radius: 10px;
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
      display: none;
    }
    .alert-error   { background: rgba(248,113,113,0.12); border: 1px solid rgba(248,113,113,0.3); color: var(--danger); }
    .alert-success { background: rgba(52,211,153,0.12); border: 1px solid rgba(52,211,153,0.3); color: var(--success); }

    .back-link { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted); }
    .back-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
    .back-link a:hover { text-decoration: underline; }

    .strength-bar { margin-top: 0.5rem; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.1); overflow: hidden; }
    .strength-bar-fill { height: 100%; width: 0; transition: width 0.3s, background 0.3s; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🛡️ Release Guard</div>

    <h2>Set New Password</h2>
    <p class="subtitle">Choose a strong password for your account. It must be at least 8 characters long.</p>

    <div id="alertError" class="alert alert-error"></div>
    <div id="alertSuccess" class="alert alert-success"></div>

    <div id="formContent">
      <div class="form-group">
        <label>New Password</label>
        <div class="password-wrapper">
          <input type="password" id="newPassword" placeholder="Minimum 8 characters" oninput="checkStrength(this.value)">
          <button type="button" class="toggle-password" onclick="toggleVis('newPassword', this)" title="Show password">👁️</button>
        </div>
        <div class="strength-bar"><div class="strength-bar-fill" id="strengthBar"></div></div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <div class="password-wrapper">
          <input type="password" id="confirmPassword" placeholder="Re-enter your new password">
          <button type="button" class="toggle-password" onclick="toggleVis('confirmPassword', this)" title="Show password">👁️</button>
        </div>
      </div>

      <button class="btn" id="submitBtn" onclick="submitReset()">Reset Password</button>
    </div>

    <div class="back-link">
      <a href="/">← Back to Login</a>
    </div>
  </div>

  <script>
    // Read token from URL query param ?token=...
    const urlParams = new URLSearchParams(window.location.search);
    const resetToken = urlParams.get('token');

    if (!resetToken) {
      showError('Invalid or missing reset link. Please request a new one.');
      document.getElementById('formContent').style.display = 'none';
    }

    function showError(msg) {
      const el = document.getElementById('alertError');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('alertSuccess').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('alertSuccess');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('alertError').style.display = 'none';
    }

    function toggleVis(inputId, btn) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🔒';
        btn.title = 'Hide password';
      } else {
        input.type = 'password';
        btn.textContent = '👁️';
        btn.title = 'Show password';
      }
    }

    function checkStrength(password) {
      const bar = document.getElementById('strengthBar');
      let score = 0;
      if (password.length >= 8)  score++;
      if (password.length >= 12) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[0-9]/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;

      const width = (score / 5) * 100 + '%';
      const colors = ['#f87171', '#fb923c', '#facc15', '#34d399', '#34d399'];
      bar.style.width = width;
      bar.style.background = colors[Math.max(0, score - 1)] || '#f87171';
    }

    async function submitReset() {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (!newPassword || newPassword.length < 8) {
        showError('Password must be at least 8 characters long.');
        return;
      }

      if (newPassword !== confirmPassword) {
        showError('Passwords do not match.');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = 'Resetting…';

      try {
        const response = await fetch('/graphql', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            query: `
              mutation ResetPassword($token: String!, $newPassword: String!) {
                resetPassword(token: $token, newPassword: $newPassword)
              }
            `,
            variables: { token: resetToken, newPassword }
          })
        });

        const result = await response.json();

        if (result.errors) {
          showError(result.errors[0].message || 'Reset failed. Your link may have expired.');
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        } else {
          showSuccess('✅ Password reset successfully! Redirecting to login…');
          document.getElementById('formContent').style.display = 'none';
          setTimeout(() => { window.location.href = '/'; }, 2500);
        }
      } catch (err) {
        showError('Connection failed. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    }
  </script>
</body>
</html>
