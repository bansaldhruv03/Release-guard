steps:
  # QA Gate: Run Unit Tests and E2E Tests
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']
  
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'test']

  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'test:e2e']

  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/release-guard-backend:$BUILD_ID'
      - '.'

  # Step 2: Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/release-guard-backend:$BUILD_ID'

  # Step 3: Deploy DIRECTLY to Cloud Run (no Cloud Deploy pipeline needed)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'release-guard-prod'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/release-guard-backend:$BUILD_ID'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=600'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--set-env-vars=NODE_ENV=production'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/release-guard-backend:$BUILD_ID'

options:
  logging: CLOUD_LOGGING_ONLY
