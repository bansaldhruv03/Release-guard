steps:
  # QA Gate: Run Unit Tests
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']

  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'test']

  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'test:e2e']

  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/release-guard-backend:$BUILD_ID'
      - '.'

  # Step 2: Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/release-guard-backend:$BUILD_ID'

  # Step 3: Deploy directly to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'release-guard-prod'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/release-guard-backend:$BUILD_ID'
      - '--platform=managed'
      - '--region=us-central1'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=600'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--clear-secrets'
      - '--set-env-vars=NODE_ENV=production,APP_URL=https://release-guard-prod-623828031948.us-central1.run.app,SMTP_HOST=smtp-relay.brevo.com,SMTP_PORT=587,SMTP_USER=aa47ff001@smtp-brevo.com,SMTP_FROM=releaseguard189@gmail.com,SMTP_PASS=xsmtpsib-40a98906dfebaf9622d0939770599756fa5f3effdd7e43c0d48d90dd2903f896-YsgvYY7CTPfox2ga,JWT_SECRET=rg-jwt-secret-prod-2026-xK9mN3pQ'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/docker-repo/release-guard-backend:$BUILD_ID'

options:
  logging: CLOUD_LOGGING_ONLY
